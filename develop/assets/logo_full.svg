<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2496ED" />
      <stop offset="100%" stop-color="#8E44AD" />
    </linearGradient>
    <style type="text/css">
      .logo-text { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 100px; }

      /* Default (Light Mode) */
      .text-main { fill: #333333; }
      .text-accent { fill: url(#gradient); }

      /* Dark Mode Override */
      @media (prefers-color-scheme: dark) {
        .text-main { fill: #EEEEEE; }
      }
    </style>
  </defs>

  <g transform="translate(30, 20) scale(0.85)">
    <!-- Creature Body -->
    <path d="M70 155V60C70 43.4315 83.4315 30 100 30H120C136.569 30 150 43.4315 150 60V80C150 96.5685 136.569 110 120 110H70" stroke="url(#gradient)" stroke-width="20" stroke-linecap="round"/>

    <!-- Container Eye -->
    <path d="M100 62L108.66 67V77L100 82L91.34 77V67L100 62Z" fill="url(#gradient)" />

    <!-- Plug Heads -->
    <rect x="150" y="55" width="16" height="10" rx="2" fill="#2496ED" />
    <rect x="150" y="75" width="16" height="10" rx="2" fill="#8E44AD" />

    <!-- DNS/IP Address Dots -->
    <circle cx="182" cy="50" r="5" fill="#2496ED" opacity="0.4" />
    <circle cx="182" cy="70" r="6" fill="url(#gradient)" />
    <circle cx="182" cy="90" r="5" fill="#8E44AD" opacity="0.4" />
    <circle cx="182" cy="110" r="5" fill="#8E44AD" opacity="0.2" />
  </g>

  <!-- REMAINING TEXT SECTION -->
  <text x="192" y="152" class="logo-text">
    <tspan class="text-main">lugN</tspan><tspan class="text-accent">PiN</tspan>
  </text>
</svg>
